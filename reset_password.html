<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password – Bath County Football</title>
    <link rel="stylesheet" href="home.css">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

    <script>
        // TODO: Replace with your Firebase config
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
    </script>

    <style>
        .reset-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        .small-text {
            margin-top: 10px;
            font-size: 0.9rem;
            text-align: center;
        }
        .small-text a {
            color: #b30000;
            font-weight: bold;
            text-decoration: none;
        }
        .small-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<header class="hero">
    <h1>Bath County Flag & Jr Pro Football</h1>
    <p>Reset Your Password</p>
</header>

<section class="main-links">

    <div class="link-card reset-card" style="max-width:450px; margin:auto;">
        <h2>Forgot Your Password?</h2>
        <p>Enter your email and we’ll send you a link to reset it.</p>

        <form id="resetForm">
            <label>Email</label>
            <input type="email" id="email" required>

            <button type="submit" class="action-btn red">Send Reset Link</button>
        </form>

        <p class="small-text">
            Remember your password?  
            <a href="login.html">Go back to login</a>
        </p>
    </div>

</section>

<footer>
    <p>© 2026 Bath County Youth Football</p>
</footer>

<script>
    document.getElementById("resetForm").onsubmit = async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();

        try {
            await auth.sendPasswordResetEmail(email);
            alert("A password reset link has been sent to your email.");
        } catch (err) {
            alert("Error: " + err.message);
        }
    };
</script>

</body>
</html>
