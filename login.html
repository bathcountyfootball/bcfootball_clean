<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Login – Bath County Football</title>
    <link rel="stylesheet" href="parent.css">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "YOUR_KEY",
            authDomain: "YOUR_DOMAIN",
            projectId: "YOUR_PROJECT",
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
    </script>
</head>

<body>

<header class="hero">
    <h1>Bath County Flag & Jr Pro Football</h1>
    <p>Parent Login</p>
</header>

<section class="content">

    <div class="card login-card">
        <h2>Login with Google</h2>
        <p>Sign in to manage your players and update registration information.</p>

        <button id="googleLogin" class="action-btn red">Sign in with Google</button>
    </div>

</section>

<script>
    document.getElementById("googleLogin").onclick = async () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
            await auth.signInWithPopup(provider);
            window.location.href = "parent-dashboard.html";
        } catch (err) {
            alert("Login failed: " + err.message);
        }
    };
</script>

</body>
</html>
