<!DOCTYPE html>
<html>
<head>
    <title>Parent Login</title>

    <!-- GLOBAL MODERN ATHLETIC THEME -->
    <link rel="stylesheet" href="theme.css">

    <style>
        .login-container {
            max-width: 420px;
            margin: 60px auto;
            background: var(--white);
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 6px 16px var(--shadow);
            text-align: center;
        }

        .login-container h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            margin-bottom: 10px;
        }

        .login-container p {
            font-size: 15px;
            color: #555;
            margin-bottom: 25px;
        }

        .login-container input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border-radius: 8px;
            border: 1px solid var(--gray-medium);
            font-size: 16px;
        }

        .login-container .action-btn {
            width: 100%;
            margin-top: 10px;
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }

        .register-link {
            margin-top: 15px;
            font-size: 14px;
        }

        .register-link a {
            color: var(--red);
            font-weight: 600;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<!-- ⭐ CENTERED ATHLETIC HEADER -->
<header class="hero">
    <h1>BATH COUNTY YOUTH FOOTBALL</h1>
</header>

<div class="login-container">
    <h2>Parent Login</h2>
    <p>Access your player information and registration details</p>

    <input type="text" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>

    <button class="action-btn" onclick="login()">Login</button>

    <div class="register-link">
        Need an account? <a href="register-parent.html">Register here</a>
    </div>
</div>

<p class="footer-text">© 2026 Bath County Youth Football</p>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxnIbz_eMUCwMyCa52oZbJTbC6PRb77FDKG6g6CMPTHt9sOd53SYd5lceIca0xH96wpBg/exec";

async function login() {
    const payload = {
        action: "parentLogin",
        email: email.value.trim(),
        password: password.value.trim()
    };

    const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (!data.success) {
        alert("Invalid login.");
        return;
    }

    // Save parent info
    localStorage.setItem("parentEmail", payload.email);
    localStorage.setItem("parentName", data.name);
    localStorage.setItem("parentPhone", data.phone);

    window.location.href = "parent-dashboard.html";
}
</script>

</body>
</html>
