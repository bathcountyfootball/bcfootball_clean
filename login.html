<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Login – Bath County Football</title>
    <link rel="stylesheet" href="home.css">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

    <script>
        // TODO: Replace with your Firebase config
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
    </script>

    <style>
        .login-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        .small-text {
            margin-top: 10px;
            font-size: 0.9rem;
            text-align: center;
        }
        .small-text a {
            color: #b30000;
            font-weight: bold;
            text-decoration: none;
        }
        .small-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<header class="hero">
    <h1>Bath County Flag & Jr Pro Football</h1>
    <p>Parent Login</p>
</header>

<section class="main-links">

    <div class="link-card login-card" style="max-width:400px; margin:auto;">
        <h2>Parent Portal Login</h2>
        <p>Sign in to manage your players and update registration information.</p>

        <form id="loginForm">
            <label>Email</label>
            <input type="email" id="email" required>

            <label>Password</label>
            <input type="password" id="password" required>

            <button type="submit" class="action-btn red">Login</button>
        </form>
		<p class="small-text">
    Forgot your password?
    <a href="reset_password.html">Reset it here</a>
</p>

        <p class="small-text">
            Need an account?  
            <a href="register_parent.html">Create one here</a>
        </p>
    </div>

</section>

<footer>
    <p>© 2026 Bath County Youth Football</p>
</footer>

<script>
    document.getElementById("loginForm").onsubmit = async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        try {
            await auth.signInWithEmailAndPassword(email, password);
            window.location.href = "parent-dashboard.html";
        } catch (err) {
            alert("Login failed: " + err.message);
        }
    };
</script>

</body>
</html>
