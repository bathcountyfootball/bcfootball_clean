<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Login – Bath County Football</title>
    <link rel="stylesheet" href="home.css">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

    <script>
        // TODO: Replace with your Firebase config
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
    </script>
</head>

<body>

<header class="hero">
    <h1>Bath County Flag & Jr Pro Football</h1>
    <p>Parent Login</p>
</header>

<section class="main-links">

    <div class="link-card" style="max-width:400px; margin:auto;">
        <h2>Parent Portal Login</h2>
        <p>Sign in to manage your players, update information, and access your dashboard.</p>

        <button id="googleLogin" class="action-btn red">Sign in with Google</button>

        <p class="small-text" style="margin-top:15px;">
            Use your Google account to access the parent portal.
        </p>
    </div>

</section>

<footer>
    <p>© 2026 Bath County Youth Football</p>
</footer>

<script>
    document.getElementById("googleLogin").onclick = async () => {
        const provider = new firebase.auth.GoogleAuthProvider();

        try {
            await auth.signInWithPopup(provider);
            window.location.href = "parent-dashboard.html";
        } catch (err) {
            alert("Google Login failed: " + err.message);
        }
    };
</script>

</body>
</html>
