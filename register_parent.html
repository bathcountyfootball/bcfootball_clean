<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Parent Account – Bath County Football</title>
    <link rel="stylesheet" href="home.css">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

    <script>
        // TODO: Replace with your Firebase config
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
    </script>

    <style>
        .register-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        .small-text {
            margin-top: 10px;
            font-size: 0.9rem;
            text-align: center;
        }
        .small-text a {
            color: #b30000;
            font-weight: bold;
            text-decoration: none;
        }
        .small-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<header class="hero">
    <h1>Bath County Flag & Jr Pro Football</h1>
    <p>Create Parent Account</p>
</header>

<section class="main-links">

    <div class="link-card register-card" style="max-width:450px; margin:auto;">
        <h2>Create Your Account</h2>
        <p>Enter your information to create your parent portal login.</p>

        <form id="registerForm">

            <label>Parent Name</label>
            <input type="text" id="parentName" required>

            <label>Email</label>
            <input type="email" id="email" required>

            <label>Password</label>
            <input type="password" id="password" required>

            <label>Phone Number</label>
            <input type="text" id="phone" required>

            <label>Address</label>
            <input type="text" id="address">

            <button type="submit" class="action-btn red">Create Account</button>
        </form>

        <p class="small-text">
            Already have an account?  
            <a href="login.html">Login here</a>
        </p>
    </div>

</section>

<footer>
    <p>© 2026 Bath County Youth Football</p>
</footer>

<script>
    document.getElementById("registerForm").onsubmit = async (e) => {
        e.preventDefault();

        const parentName = document.getElementById("parentName").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const phone = document.getElementById("phone").value.trim();
        const address = document.getElementById("address").value.trim();

        try {
            // Create Firebase Auth user
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            const user = userCredential.user;

            // Store parent profile in Firestore
            await db.collection("parents").doc(user.uid).set({
                parentName,
                email,
                phone,
                address,
                createdAt: new Date()
            });

            alert("Account created successfully!");
            window.location.href = "parent-dashboard.html";

        } catch (err) {
            alert("Account creation failed: " + err.message);
        }
    };
</script>

</body>
</html>
