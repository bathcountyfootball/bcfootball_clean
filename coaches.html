<!DOCTYPE html>
<html>
<head>
    <title>Coach Login</title>
    <link rel="stylesheet" href="home.css">
</head>

<body>

<nav class="top-nav">
    <a href="youth.index.html" class="nav-link">Home</a>
    <a href="login.html" class="nav-link">Parent Login</a>
    <a href="coaches.html" class="nav-link">Coach Login</a>
    <a href="admin.html" class="nav-link">Admin Login</a>
</nav>

<header class="hero">
    <h1>Coach Login</h1>
</header>

<section class="main-links">
    <div class="link-card" style="max-width:400px; margin:auto;">
        <h2>Coach Access</h2>

        <form id="loginForm">
            <label>Username</label>
            <input type="text" id="username" required>

            <label>Password</label>
            <input type="password" id="password" required>

            <button class="action-btn red">Login</button>
        </form>
    </div>
</section>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxnIbz_eMUCwMyCa52oZbJTbC6PRb77FDKG6g6CMPTHt9sOd53SYd5lceIca0xH96wpBg/exec";

document.getElementById("loginForm").onsubmit = async (e) => {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    // ⭐ REQUIRED for Apps Script to recognize the login request
    const payload = {
        action: "login",
        username,
        password
    };

    const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (!data.success) {
        alert("Invalid username or password");
        return;
    }

    if (data.role !== "coach") {
        alert("You are not authorized as a coach");
        return;
    }

    // Save coach session
    localStorage.setItem("coachUser", username);
    localStorage.setItem("coachName", data.name);
    localStorage.setItem("coachEmail", data.email);

    // ⭐ FIXED redirect filename
    window.location.href = "coach-dashboard.html";
};
</script>

</body>
</html>
