<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Player – Bath County Football</title>
    <link rel="stylesheet" href="parent.css">
</head>

<body>

<header class="hero">
    <h1>Edit Player Information</h1>
</header>

<section class="content">

    <div class="card">
        <form id="editPlayerForm">

            <label>Player Name</label>
            <input type="text" id="playerName">

            <label>Birthdate</label>
            <input type="date" id="birthdate">

            <label>School</label>
            <input type="text" id="school">

            <label>Grade</label>
            <input type="number" id="grade">

            <label>Gender</label>
            <select id="gender">
                <option>Male</option>
                <option>Female</option>
            </select>

            <label>Shirt Size</label>
            <select id="shirtSize">
                <option>YS</option>
                <option>YM</option>
                <option>YL</option>
                <option>S</option>
                <option>M</option>
                <option>L</option>
                <option>XL</option>
            </select>

            <label>Doctor Name</label>
            <input type="text" id="doctorName">

            <label>Doctor Phone</label>
            <input type="text" id="doctorPhone">

            <label>Allergies / Medical Notes</label>
            <input type="text" id="allergies">

            <button class="action-btn red">Save Changes</button>
        </form>
    </div>

</section>

<footer>
    <p>© 2026 Bath County Youth Football</p>
</footer>

</body>
</html>
