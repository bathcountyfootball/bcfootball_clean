<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Player – Bath County Football</title>
    <link rel="stylesheet" href="parent.css">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "YOUR_KEY",
            authDomain: "YOUR_DOMAIN",
            projectId: "YOUR_PROJECT",
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
    </script>
</head>

<body>

<header class="hero">
    <h1>Edit Player Information</h1>
</header>

<section class="content">

    <div class="card">
        <form id="editPlayerForm">
            <label>Player Name</label>
            <input type="text" id="playerName">

            <label>Birthdate</label>
            <input type="date" id="birthdate">

            <label>School</label>
            <input type="text" id="school">

            <label>Grade</label>
            <input type="number" id="grade">

            <label>Gender</label>
            <select id="gender">
                <option>Male</option>
                <option>Female</option>
            </select>

            <label>Shirt Size</label>
            <select id="shirtSize">
                <option>YS</option>
                <option>YM</option>
                <option>YL</option>
                <option>S</option>
                <option>M</option>
                <option>L</option>
                <option>XL</option>
            </select>

            <label>Doctor Name</label>
            <input type="text" id="doctorName">

            <label>Doctor Phone</label>
            <input type="text" id="doctorPhone">

            <label>Allergies / Medical Notes</label>
            <input type="text" id="allergies">

            <button class="action-btn red">Save Changes</button>
        </form>
    </div>

</section>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const playerId = urlParams.get("id");

    auth.onAuthStateChanged(async user => {
        if (!user) {
            window.location.href = "login.html";
            return;
        }

        const doc = await db.collection("players").doc(playerId).get();
        const p = doc.data();

        document.getElementById("playerName").value = p.playerName;
        document.getElementById("birthdate").value = p.birthdate;
        document.getElementById("school").value = p.school;
        document.getElementById("grade").value = p.grade;
        document.getElementById("gender").value = p.gender;
        document.getElementById("shirtSize").value = p.shirtSize;
        document.getElementById("doctorName").value = p.doctorName;
        document.getElementById("doctorPhone").value = p.doctorPhone;
        document.getElementById("allergies").value = p.allergies;
    });

    document.getElementById("editPlayerForm").onsubmit = async (e) => {
        e.preventDefault();

        await db.collection("players").doc(playerId).update({
            playerName: playerName.value,
            birthdate: birthdate.value,
            school: school.value,
            grade: grade.value,
            gender: gender.value,
            shirtSize: shirtSize.value,
            doctorName: doctorName.value,
            doctorPhone: doctorPhone.value,
            allergies: allergies.value
        });

        alert("Player updated!");
        window.location.href = "parent-dashboard.html";
    };
</script>

</body>
</html>
