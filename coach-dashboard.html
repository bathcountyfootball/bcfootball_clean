<!DOCTYPE html>
<html>
<head>
    <title>Coach Dashboard</title>

    <!-- GLOBAL MODERN ATHLETIC THEME -->
    <link rel="stylesheet" href="theme.css">

    <style>
        /* Page-specific tweaks (minimal) */
        .section-container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }
    </style>
</head>

<body>

<script>
if (!localStorage.getItem("coachUser")) {
    window.location.href = "coaches.html";
}
</script>

<!-- ⭐ CENTERED ATHLETIC HEADER -->
<header class="hero">
    <h1>BATH COUNTY YOUTH FOOTBALL</h1>
</header>

<div class="section-container">

    <!-- ⭐ MAIN LINKS -->
    <section class="main-links">
        <h2>Coach Tools</h2>

        <div class="link-card">
            <h3>Your Coaching Profile</h3>
            <p id="coachProfile">Loading...</p>
            <button class="action-btn" onclick="logout()">Logout</button>
        </div>

        <div class="link-card">
            <h3>Your Team Roster</h3>
            <button class="action-btn" onclick="openRoster()">View Team Roster</button>
        </div>

        <div class="link-card">
            <h3>Assign Players</h3>
            <button class="action-btn" onclick="openAssign()">Assign Players</button>
        </div>

        <div class="link-card">
            <h3>Equipment & Jersey Tracking (Jr Pro)</h3>
            <button class="action-btn" onclick="openEquipment()">Manage Equipment</button>
        </div>
    </section>

    <!-- ⭐ PLAYER REGISTRATION -->
    <section style="margin-top:40px;">
        <h2>Register a Player</h2>

        <form id="playerForm">

            <label>Player First Name</label>
            <input type="text" id="playerFirst" required>

            <label>Player Last Name</label>
            <input type="text" id="playerLast" required>

            <label>Birthdate</label>
            <input type="date" id="birthdate" required>

            <label>Grade</label>
            <input type="text" id="grade" required>

            <label>School</label>
            <input type="text" id="school" required>

            <label>Shirt Size</label>
            <input type="text" id="shirtSize" required>

            <label>Medical Conditions</label>
            <input type="text" id="medical" placeholder="None">

            <label>Allergies</label>
            <input type="text" id="allergies" placeholder="None">

            <label>Emergency Contact Name</label>
            <input type="text" id="emergencyName" required>

            <label>Emergency Contact Phone</label>
            <input type="text" id="emergencyPhone" required>

            <label>Team</label>
            <select id="team" required>
                <option value="">Select Team</option>
                <option value="Flag">Flag</option>
                <option value="Jr Pro">Jr Pro</option>
                <option value="Sr Pro">Sr Pro</option>
            </select>

            <label>Experience</label>
            <select id="experience" required>
                <option value="">Select</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>

            <button type="submit" class="action-btn">Register Player</button>
        </form>
    </section>
</div>

<!-- ⭐ ASSIGN PLAYERS MODAL -->
<div id="assignModal" class="modal">
  <div class="modal-content">
    <h2>Assign Players</h2>

    <label>Search Player</label>
    <input type="text" id="assignSearch">

    <button class="action-btn" onclick="loadAssignPlayers()">Search</button>

    <div id="assignResults" style="margin-top:20px;"></div>

    <button class="action-btn" onclick="closeAssign()">Close</button>
  </div>
</div>

<!-- ⭐ TEAM ROSTER MODAL -->
<div id="rosterModal" class="modal">
  <div class="modal-content">
    <h2>Team Roster</h2>

    <label>Select Team</label>
    <select id="rosterTeam">
        <option value="Flag">Flag</option>
        <option value="Jr Pro">Jr Pro</option>
        <option value="Sr Pro">Sr Pro</option>
    </select>

    <button class="action-btn" onclick="loadTeamRoster()">Load Roster</button>

    <div id="rosterResults" style="margin-top:20px;"></div>

    <button class="action-btn" onclick="closeRoster()">Close</button>
  </div>
</div>

<!-- ⭐ EQUIPMENT MODAL -->
<div id="equipmentModal" class="modal">
  <div class="modal-content">
    <h2>Equipment & Jersey Tracking (Jr Pro)</h2>

    <label>Search Jr Pro Player</label>
    <input type="text" id="equipSearch">

    <button class="action-btn" onclick="loadEquipmentPlayer()">Search</button>

    <div id="equipmentForm" style="margin-top:20px;"></div>

    <button class="action-btn" onclick="closeEquipment()">Close</button>
  </div>
</div>

<footer>
    <p>© 2026 Bath County Youth Football</p>
</footer>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxnIbz_eMUCwMyCa52oZbJTbC6PRb77FDKG6g6CMPTHt9sOd53SYd5lceIca0xH96wpBg/exec";

document.getElementById("coachProfile").innerText =
    localStorage.getItem("coachName") + " (" + localStorage.getItem("coachEmail") + ")";

function logout() {
    localStorage.removeItem("coachUser");
    localStorage.removeItem("coachName");
    localStorage.removeItem("coachEmail");
    window.location.href = "coaches.html";
}

/* ⭐ PLAYER REGISTRATION */
document.getElementById("playerForm").onsubmit = async (e) => {
    e.preventDefault();

    const payload = {
        action: "registerPlayer",
        coachName: localStorage.getItem("coachName"),
        coachEmail: localStorage.getItem("coachEmail"),
        coachUser: localStorage.getItem("coachUser"),

        playerFirst: playerFirst.value.trim(),
        playerLast: playerLast.value.trim(),
        birthdate: birthdate.value,
        grade: grade.value.trim(),
        school: school.value.trim(),
        shirtSize: shirtSize.value.trim(),
        medical: medical.value.trim(),
        allergies: allergies.value.trim(),
        emergencyName: emergencyName.value.trim(),
        emergencyPhone: emergencyPhone.value.trim(),
        team: team.value,
        experience: experience.value
    };

    const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
    const data = await res.json();

    alert(data.success ? "Player registered!" : "Registration failed.");
};

/* ⭐ ASSIGN PLAYERS */
function openAssign() { assignModal.style.display = "flex"; }
function closeAssign() { assignModal.style.display = "none"; }

async function loadAssignPlayers() {
    const search = assignSearch.value.trim();

    const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "searchAllPlayers", search })
    });

    const data = await res.json();

    if (!data.success || data.players.length === 0) {
        assignResults.innerHTML = "<p>No players found.</p>";
        return;
    }

    let html = "<ul>";
    data.players.forEach(p => {
        html += `
            <li>
                <strong>${p.name}</strong> (Grade ${p.grade})<br><br>

                <label>Assign Coach:</label>
                <select id="coach_${p.id}">
                    ${data.coaches.map(c => `<option value="${c.email}">${c.name}</option>`).join("")}
                </select>

                <label>Team:</label>
                <select id="team_${p.id}">
                    <option value="Flag">Flag</option>
                    <option value="Jr Pro">Jr Pro</option>
                    <option value="Sr Pro">Sr Pro</option>
                </select>

                <button class="action-btn" onclick="assignPlayer('${p.id}')">Save</button>
            </li>
        `;
    });
    html += "</ul>";

    assignResults.innerHTML = html;
}

async function assignPlayer(id) {
    const coachEmail = document.getElementById(`coach_${id}`).value;
    const team = document.getElementById(`team_${id}`).value;

    const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "assignPlayer", id, coachEmail, team })
    });

    const data = await res.json();

    alert(data.success ? "Player assigned!" : "Failed to assign.");
}

/* ⭐ TEAM ROSTER */
function openRoster() { rosterModal.style.display = "flex"; }
function closeRoster() { rosterModal.style.display = "none"; }

async function loadTeamRoster() {
    const team = rosterTeam.value;

    const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "getTeamRoster", team })
    });

    const data = await res.json();

    if (!data.success || data.players.length === 0) {
        rosterResults.innerHTML = "<p>No players found.</p>";
        return;
    }

    let html = "<ul>";
    data.players.forEach(p => {
        html += `
            <li>
                <strong>${p.name}</strong><br>
                Grade: ${p.grade}<br>
                School: ${p.school}<br>
                Shirt Size: ${p.shirtSize}
            </li>
        `;
    });
    html += "</ul>";

    rosterResults.innerHTML = html;
}

/* ⭐ EQUIPMENT TRACKING */
function openEquipment() { equipmentModal.style.display = "flex"; }
function closeEquipment() { equipmentModal.style.display = "none"; }

async function loadEquipmentPlayer() {
    const search = equipSearch.value.trim().toLowerCase();

    const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "getAllRegistrations" })
    });

    const data = await res.json();

    const jrProPlayers = data.rows.filter(p =>
        p.team === "Jr Pro" && p.name.toLowerCase().includes(search)
    );

    if (jrProPlayers.length === 0) {
        equipmentForm.innerHTML = "<p>No Jr Pro players found.</p>";
        return;
    }

    const player = jrProPlayers[0];

    const equipRes = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "getEquipment", name: player.name })
    });

    const equipData = await equipRes.json();

    const eq = equipData.success ? equipData.equipment : {
        helmetIssued: "",
        helmetReturn: "",
        padsIssued: "",
        padsReturn: "",
        pantsIssued: "",
        pantsReturn: "",
        jerseyNumber: "",
        jerseyReturn: ""
    };

    equipmentForm.innerHTML = `
        <h3>${player.name}</h3>
        Grade: ${player.grade}<br>
        School: ${player.school}<br><br>

        <label>Helmet Issued</label>
        <input type="text" id="helmetIssued" value="${eq.helmetIssued}">

        <label>Helmet Returned</label>
        <input type="text" id="helmetReturn" value="${eq.helmetReturn}">

        <label>Pads Issued</label>
        <input type="text" id="padsIssued" value="${eq.padsIssued}">

        <label>Pads Returned</label>
        <input type="text" id="padsReturn" value="${eq.padsReturn}">

        <label>Pants Issued</label>
        <input type="text" id="pantsIssued" value="${eq.pantsIssued}">

        <label>Pants Returned</label>
        <input type="text" id="pantsReturn" value="${eq.pantsReturn}">

        <label>Jersey Number</label>
        <input type="text" id="jerseyNumber" value="${eq.jerseyNumber}">

        <label>Jersey Returned</label>
        <input type="text" id="jerseyReturn" value="${eq.jerseyReturn}">

        <button class="action-btn"
            onclick="saveEquipment('${player.name}', '${player.grade}', '${player.team}')">
            Save Equipment
        </button>
    `;
}

async function saveEquipment(name, grade, team) {
    const payload = {
        action: "saveEquipment",
        name,
        grade,
        team,

        helmetIssued: helmetIssued.value,
        helmetReturn: helmetReturn.value,
        padsIssued: padsIssued.value,
        padsReturn: padsReturn.value,
        pantsIssued: pantsIssued.value,
        pantsReturn: pantsReturn.value,
        jerseyNumber: jerseyNumber.value,
        jerseyReturn: jerseyReturn.value,

        updatedBy: localStorage.getItem("coachEmail")
    };

    const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(payload)
    });

    const data = await res.json();

    alert(data.success ? "Equipment saved!" : "Failed to save.");
}
</script>

</body>
</html>
