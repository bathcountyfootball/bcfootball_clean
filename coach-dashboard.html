<!DOCTYPE html>
<html>
<head>
    <title>Coach Dashboard</title>
    <link rel="stylesheet" href="home.css">
</head>

<body>

<script>
// Protect dashboard
if (!localStorage.getItem("coachUser")) {
    window.location.href = "coaches.html";
}
</script>

<header class="hero">
    <h1>Coach Dashboard</h1>
</header>

<section class="main-links">
    <h2>Team Management & Tools</h2>

    <div class="link-card">
        <h3>Your Coaching Profile</h3>
        <p id="coachProfile">Loading...</p>
        <button class="action-btn red" onclick="logout()">Logout</button>
    </div>

    <div class="link-card">
        <h3>Your Children</h3>
        <p id="coachKids">Loading...</p>
    </div>

    <div class="link-card">
        <h3>Your Team Roster</h3>
        <p id="teamRoster">Loading roster...</p>
    </div>

    <div class="link-card">
        <h3>Assign Players to Coaches & Teams</h3>
        <button class="action-btn red" onclick="openAssign()">Assign Players</button>
    </div>

    <div class="link-card">
        <h3>Attendance Tracking</h3>
        <button class="action-btn red" onclick="openAttendance()">Open Attendance Tool</button>
    </div>

    <div class="link-card">
        <h3>Team Schedule</h3>
        <button class="action-btn red" onclick="openSchedule()">View Schedule</button>
    </div>

    <div class="link-card">
        <h3>Player Cards</h3>
        <button class="action-btn red" onclick="openCards()">View Player Cards</button>
    </div>
</section>

<!-- ⭐ NEW: Coach Player Registration Section -->
<section class="registration-section" style="max-width:600px; margin:auto;">
    <h2>Register a Player</h2>

    <form id="playerForm">

        <label>Player First Name</label>
        <input type="text" id="playerFirst" required>

        <label>Player Last Name</label>
        <input type="text" id="playerLast" required>

        <label>Birthdate</label>
        <input type="date" id="birthdate" required>

        <label>Grade</label>
        <input type="text" id="grade" required>

        <label>School</label>
        <input type="text" id="school" required>

        <label>Shirt Size</label>
        <input type="text" id="shirtSize" required>

        <label>Medical Conditions</label>
        <input type="text" id="medical" placeholder="None">

        <label>Allergies</label>
        <input type="text" id="allergies" placeholder="None">

        <label>Emergency Contact Name</label>
        <input type="text" id="emergencyName" required>

        <label>Emergency Contact Phone</label>
        <input type="text" id="emergencyPhone" required>

        <label>Team</label>
        <select id="team" required>
            <option value="">Select Team</option>
            <option value="Flag">Flag</option>
            <option value="Jr Pro">Jr Pro</option>
            <option value="Sr Pro">Sr Pro</option>
        </select>

        <label>Experience</label>
        <select id="experience" required>
            <option value="">Select</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <button type="submit" class="action-btn red">Register Player</button>
    </form>
</section>

<footer>
    <p>© 2026 Bath County Youth Football</p>
</footer>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxnIbz_eMUCwMyCa52oZbJTbC6PRb77FDKG6g6CMPTHt9sOd53SYd5lceIca0xH96wpBg/exec";

// Load coach profile
document.getElementById("coachProfile").innerText =
    localStorage.getItem("coachName") + " (" + localStorage.getItem("coachEmail") + ")";

// Logout
function logout() {
    localStorage.removeItem("coachUser");
    localStorage.removeItem("coachName");
    localStorage.removeItem("coachEmail");
    window.location.href = "coaches.html";
}

// Placeholder functions for your existing tools
function openAssign() { alert("Assign Players tool coming soon."); }
function openAttendance() { alert("Attendance tool coming soon."); }
function openSchedule() { alert("Schedule tool coming soon."); }
function openCards() { alert("Player Cards coming soon."); }

// ⭐ Handle Player Registration
document.getElementById("playerForm").onsubmit = async (e) => {
    e.preventDefault();

    const payload = {
        action: "registerPlayer",

        // Auto-filled parent info
        coachName: localStorage.getItem("coachName"),
        coachEmail: localStorage.getItem("coachEmail"),
        coachUser: localStorage.getItem("coachUser"),

        // Player info
        playerFirst: document.getElementById("playerFirst").value.trim(),
        playerLast: document.getElementById("playerLast").value.trim(),
        birthdate: document.getElementById("birthdate").value,
        grade: document.getElementById("grade").value.trim(),
        school: document.getElementById("school").value.trim(),
        shirtSize: document.getElementById("shirtSize").value.trim(),
        medical: document.getElementById("medical").value.trim(),
        allergies: document.getElementById("allergies").value.trim(),
        emergencyName: document.getElementById("emergencyName").value.trim(),
        emergencyPhone: document.getElementById("emergencyPhone").value.trim(),
        team: document.getElementById("team").value,
        experience: document.getElementById("experience").value
    };

    const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (data.success) {
        alert("Player registered successfully!");
        document.getElementById("playerForm").reset();
    } else {
        alert("Registration failed. Please try again.");
    }
};
</script>

</body>
</html>
