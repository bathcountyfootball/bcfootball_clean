<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Registration – Bath County Football</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">
    <h1>Player Registration</h1>
    <h2>Bath County Flag & Jr Pro Football</h2>

    <!-- STEP CONTAINER -->
    <div id="step-container">

        <!-- STEP 1: Parent Info -->
        <div class="step" id="step1">
            <h3>Parent Information</h3>

            <label>Parent Name</label>
            <input type="text" id="parentName">

            <label>Parent Email</label>
            <input type="email" id="parentEmail">

            <label>Parent Phone</label>
            <input type="text" id="parentPhone">

            <button class="next-btn" onclick="nextStep()">Next</button>
        </div>

        <!-- STEP 2: Player Info -->
        <div class="step" id="step2">
            <h3>Player Information</h3>

            <label>Player Name</label>
            <input type="text" id="playerName">

            <label>Birthdate</label>
            <input type="date" id="birthdate">

            <label>School</label>
            <input type="text" id="school">

            <label>Grade</label>
            <input type="number" id="grade">

            <label>Gender</label>
            <select id="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <label>League</label>
            <select id="league">
                <option value="Flag">Flag</option>
                <option value="Jr Pro">Jr Pro</option>
            </select>

            <label>Shirt Size</label>
            <select id="shirtSize">
                <option>YS</option>
                <option>YM</option>
                <option>YL</option>
                <option>S</option>
                <option>M</option>
                <option>L</option>
                <option>XL</option>
            </select>

            <button class="back-btn" onclick="prevStep()">Back</button>
            <button class="next-btn" onclick="nextStep()">Next</button>
        </div>

        <!-- STEP 3: Medical Info -->
        <div class="step" id="step3">
            <h3>Medical Information</h3>

            <label>Doctor Name</label>
            <input type="text" id="doctorName">

            <label>Doctor Phone</label>
            <input type="text" id="doctorPhone">

            <label>Allergies / Medical Notes</label>
            <textarea id="allergies"></textarea>

            <button class="back-btn" onclick="prevStep()">Back</button>
            <button class="next-btn" onclick="nextStep()">Next</button>
        </div>

        <!-- STEP 4: Payment Plan -->
        <div class="step" id="step4">
            <h3>Payment Plan</h3>

            <label>Select Payment Option</label>
            <select id="paymentPlan">
                <option value="full">Pay in Full</option>
                <option value="split">Pay in 2 Payments</option>
            </select>

            <p id="siblingNote" class="info-note">
                Sibling discount applies only to Pay-in-Full.
            </p>

            <button class="back-btn" onclick="prevStep()">Back</button>
            <button class="next-btn" onclick="nextStep()">Next</button>
        </div>

        <!-- STEP 5: Review & Pay -->
        <div class="step" id="step5">
            <h3>Review & Pay</h3>

            <div id="reviewBox"></div>

            <button class="back-btn" onclick="prevStep()">Back</button>
            <button class="submit-btn" onclick="submitRegistration()">Submit & Pay</button>
        </div>

    </div>
</div>

<script src="registration.js"></script>

</body>
</html>
