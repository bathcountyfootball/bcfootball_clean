<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Registration – Bath County Football</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .accordion {
            background: #f2f2f2;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .panel {
            display: none;
            padding: 10px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .btn {
            padding: 10px 14px;
            background: #c00;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }
        .submit-btn {
            padding: 12px 18px;
            background: #008000;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Player Registration</h1>
        <h2>Bath County Flag & Jr Pro Football</h2>

        <form id="registrationForm">

            <!-- Parent Information -->
            <section class="form-section">
                <h3>Parent Information</h3>

                <label>Parent Name</label>
                <input type="text" id="parentName" required>

                <label>Parent Email</label>
                <input type="email" id="parentEmail" required>

                <label>Parent Phone</label>
                <input type="tel" id="parentPhone" required>
            </section>

            <!-- Add Player -->
            <button type="button" class="btn" onclick="addPlayer()">+ Add Player</button>

            <div id="playersContainer"></div>

            <!-- Payment Plan -->
            <section class="form-section">
                <h3>Payment Plan</h3>

                <label>Select Payment Option</label>
                <select id="paymentPlan" required>
                    <option value="">Select</option>
                    <option value="full">Pay in Full</option>
                    <option value="plan">2‑Payment Plan</option>
                </select>

                <p class="note">Sibling discount applies only to Pay‑in‑Full.</p>
            </section>

            <!-- Review -->
            <section class="form-section">
                <h3>Review Your Information</h3>
                <div id="reviewBox"></div>
                <button type="button" class="btn" onclick="buildReview()">Refresh Review</button>
            </section>

            <!-- Submit -->
            <section class="form-section">
                <button type="button" class="submit-btn" onclick="submitRegistration()">Submit & Pay</button>
            </section>

        </form>
    </div>

    <script src="scripts/registration.js"></script>
</body>
</html>
