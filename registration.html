<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Registration – Bath County Football</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">
        <h1>Player Registration</h1>
        <h2>Bath County Flag & Jr Pro Football</h2>

        <form id="registrationForm">

            <!-- Parent Information -->
            <section class="form-section">
                <h3>Parent Information</h3>

                <label for="parentName">Parent Name</label>
                <input type="text" id="parentName" name="parentName" required>

                <label for="parentEmail">Parent Email</label>
                <input type="email" id="parentEmail" name="parentEmail" required>

                <label for="parentPhone">Parent Phone</label>
                <input type="tel" id="parentPhone" name="parentPhone" required>
            </section>

            <!-- Player Information -->
            <section class="form-section">
                <h3>Player Information</h3>

                <label for="playerName">Player Name</label>
                <input type="text" id="playerName" name="playerName" required>

                <label for="birthdate">Birthdate</label>
                <input type="date" id="birthdate" name="birthdate" required>

                <label for="school">School</label>
                <input type="text" id="school" name="school" required>

                <label for="grade">Grade</label>
                <input type="number" id="grade" name="grade" required>

                <label for="gender">Gender</label>
                <select id="gender" name="gender" required>
                    <option value="">Select</option>
                    <option>Male</option>
                    <option>Female</option>
                </select>

                <label for="league">League</label>
                <select id="league" name="division" required>
                    <option value="">Select</option>
                    <option value="Flag">Flag</option>
                    <option value="Jr Pro">Jr Pro</option>
                </select>

                <label for="shirtSize">Shirt Size</label>
                <select id="shirtSize" name="shirtSize" required>
                    <option value="">Select</option>
                    <option>YS</option>
                    <option>YM</option>
                    <option>YL</option>
                    <option>YXL</option>
                </select>
            </section>

            <!-- Medical Information -->
            <section class="form-section">
                <h3>Medical Information</h3>

                <label for="doctorName">Doctor Name</label>
                <input type="text" id="doctorName" name="doctorName" required>

                <label for="doctorPhone">Doctor Phone</label>
                <input type="tel" id="doctorPhone" name="doctorPhone" required>

                <label for="allergies">Allergies / Medical Notes</label>
                <textarea id="allergies" name="medicalNotes"></textarea>
            </section>

            <!-- Payment Plan -->
            <section class="form-section">
                <h3>Payment Plan</h3>

                <label for="paymentPlan">Select Payment Option</label>
                <select id="paymentPlan" name="paymentOption" required>
                    <option value="">Select</option>
                    <option value="full">Pay in Full</option>
                    <option value="plan">2‑Payment Plan</option>
                </select>

                <p class="note">Sibling discount applies only to Pay‑in‑Full.</p>
            </section>

            <!-- Review -->
            <section class="form-section">
                <h3>Review Your Information</h3>
                <div id="reviewBox"></div>
                <button type="button" class="btn" onclick="buildReview()">Refresh Review</button>
            </section>

            <!-- Submit -->
            <section class="form-section">
                <button type="button" class="submit-btn" onclick="submitRegistration()">Submit & Pay</button>
            </section>

        </form>
    </div>

    <script src="scripts/registration.js"></script>
</body>
</html>
