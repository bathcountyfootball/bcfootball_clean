<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BC Football Registration</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>BC Football Registration</h1>

  <form id="registration-form">
    <fieldset>
      <legend>Parent Information</legend>
      <label>
        Parent Name:
        <input type="text" id="parent-name" required>
      </label>
      <label>
        Parent Email:
        <input type="email" id="parent-email" required>
      </label>
      <label>
        Phone:
        <input type="tel" id="parent-phone" required>
      </label>
    </fieldset>

    <h2>Players</h2>
    <div id="players-container"></div>

    <button type="button" id="add-player-btn">Add Player</button>

    <section id="review-section" style="display:none; margin-top:20px;">
      <h2>Review & Pay</h2>
      <div id="breakdown"></div>
      <p id="total-due" style="font-weight:bold;"></p>
      <p>
        <strong>Step 2:</strong> Click the button below and enter the
        <strong>exact total</strong> shown above.
      </p>
      <p>
        After payment, your registration is recorded automatically in our system.
      </p>
      <a id="pay-now-btn"
         href="https://square.link/u/sS8n48d5?src=sheet"
         target="_blank"
         style="display:inline-block;padding:10px 20px;background:#007bff;color:#fff;text-decoration:none;border-radius:4px;">
        Pay Now
      </a>
    </section>

    <button type="submit" id="submit-btn" style="margin-top:20px;">
      Save Registration
    </button>
  </form>

  <script src="registration.js"></script>
</body>
</html>
