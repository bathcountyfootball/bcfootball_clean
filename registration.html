<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Registration – Bath County Football</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">
        <h1>Player Registration</h1>
        <h2>Bath County Flag & Jr Pro Football</h2>

        <form id="registrationForm">

            <!-- STEP 1: Parent Information -->
            <div class="form-step" id="step-1">
                <h3>Parent Information</h3>

                <label>Parent Name</label>
                <input type="text" name="parentName" required>

                <label>Parent Email</label>
                <input type="email" name="parentEmail" required>

                <label>Parent Phone</label>
                <input type="tel" name="parentPhone" required>

                <button type="button" class="next-btn" onclick="nextStep(2)">Next</button>
            </div>

            <!-- STEP 2: Player Information -->
            <div class="form-step" id="step-2" style="display:none;">
                <h3>Player Information</h3>

                <label>Player Name</label>
                <input type="text" name="playerName" required>

                <label>Birthdate</label>
                <input type="date" name="birthdate" required>

                <label>School</label>
                <input type="text" name="school" required>

                <label>Grade</label>
                <input type="number" name="grade" required>

                <label>Gender</label>
                <select name="gender" required>
                    <option value="">Select</option>
                    <option>Male</option>
                    <option>Female</option>
                </select>

                <label>League</label>
                <select name="division" required>
                    <option value="">Select</option>
                    <option value="Flag">Flag</option>
                    <option value="Jr Pro">Jr Pro</option>
                </select>

                <label>Shirt Size</label>
                <select name="shirtSize" required>
                    <option value="">Select</option>
                    <option>YS</option>
                    <option>YM</option>
                    <option>YL</option>
                    <option>YXL</option>
                </select>

                <button type="button" class="back-btn" onclick="nextStep(1)">Back</button>
                <button type="button" class="next-btn" onclick="nextStep(3)">Next</button>
            </div>

            <!-- STEP 3: Medical Information -->
            <div class="form-step" id="step-3" style="display:none;">
                <h3>Medical Information</h3>

                <label>Doctor Name</label>
                <input type="text" name="doctorName" required>

                <label>Doctor Phone</label>
                <input type="tel" name="doctorPhone" required>

                <label>Allergies / Medical Notes</label>
                <textarea name="medicalNotes"></textarea>

                <button type="button" class="back-btn" onclick="nextStep(2)">Back</button>
                <button type="button" class="next-btn" onclick="nextStep(4)">Next</button>
            </div>

            <!-- STEP 4: Payment Plan -->
            <div class="form-step" id="step-4" style="display:none;">
                <h3>Payment Plan</h3>

                <label>Select Payment Option</label>
                <select name="paymentOption" required>
                    <option value="">Select</option>
                    <option value="full">Pay in Full</option>
                    <option value="plan">2‑Payment Plan</option>
                </select>

                <p class="note">Sibling discount applies only to Pay‑in‑Full.</p>

                <button type="button" class="back-btn" onclick="nextStep(3)">Back</button>
                <button type="button" class="next-btn" onclick="nextStep(5)">Next</button>
            </div>

            <!-- STEP 5: Review & Pay -->
            <div class="form-step" id="step-5" style="display:none;">
                <h3>Review & Pay</h3>

                <p>Please review your information and click Submit & Pay.</p>

                <button type="button" class="back-btn" onclick="nextStep(4)">Back</button>

                <!-- FINAL BUTTON ONLY -->
                <button type="button" class="submit-btn" onclick="submitRegistration()">Submit & Pay</button>
            </div>

        </form>
    </div>

    <script src="scripts/registration.js"></script>
</body>
</html>
