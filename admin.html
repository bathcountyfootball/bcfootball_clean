<!DOCTYPE html>
<html>
<head>
Test
    <title>Admin Login</title>

    <!-- GLOBAL MODERN ATHLETIC THEME -->
    <link rel="stylesheet" href="theme.css">

    <style>
        .login-container {
            max-width: 420px;
            margin: 60px auto;
            background: var(--white);
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 6px 16px var(--shadow);
            text-align: center;
        }

        .login-container h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            margin-bottom: 10px;
        }

        .login-container p {
            font-size: 15px;
            color: #555;
            margin-bottom: 25px;
        }

        .login-container input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border-radius: 8px;
            border: 1px solid var(--gray-medium);
            font-size: 16px;
        }

        .login-container .action-btn {
            width: 100%;
            margin-top: 10px;
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>

<body>

<!-- ⭐ CENTERED ATHLETIC HEADER -->
<header class="hero">
    <h1>BATH COUNTY YOUTH FOOTBALL</h1>
</header>

<div class="login-container">
    <h2>Admin Login</h2>
    <p>Access the admin dashboard and management tools</p>

    <input type="text" id="username" placeholder="Admin Username" required>
    <input type="password" id="password" placeholder="Password" required>

    <button class="action-btn" onclick="login()">Login</button>
</div>

<p class="footer-text">© 2026 Bath County Youth Football</p>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxnIbz_eMUCwMyCa52oZbJTbC6PRb77FDKG6g6CMPTHt9sOd53SYd5lceIca0xH96wpBg/exec";

async function login() {
    const payload = {
        action: "login",
        username: username.value.trim(),
        password: password.value.trim()
    };

    const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (!data.success || data.role !== "admin") {
        alert("Invalid admin login.");
        return;
    }

    // Save admin info
    localStorage.setItem("adminUser", payload.username);
    localStorage.setItem("adminName", data.name);
    localStorage.setItem("adminEmail", data.email);

    window.location.href = "admin-dashboard.html";
}
</script>

</body>
</html>
