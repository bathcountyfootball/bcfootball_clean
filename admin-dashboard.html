<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard – Bath County Football</title>
    <link rel="stylesheet" href="home.css">
</head>

<body>

<script>
// Protect dashboard
if (!localStorage.getItem("adminUser")) {
    window.location.href = "admin.html";
}
</script>

<header class="hero">
    <h1>Admin Dashboard</h1>
</header>

<section class="main-links">
    <h2>In‑Person Registrations & Management</h2>

    <div class="link-card">
        <h3>Admin Profile</h3>
        <p id="adminProfile">Loading...</p>
        <button class="action-btn red" onclick="logout()">Logout</button>
    </div>
</section>

<!-- ⭐ IN-PERSON REGISTRATION FORM -->
<section class="registration-section" style="max-width:600px; margin:auto;">
    <h2>Enter In‑Person Registration</h2>

    <form id="inPersonForm">

        <label>Player Name</label>
        <input type="text" id="playerName" required>

        <label>Birthdate</label>
        <input type="text" id="birthdate" placeholder="mm / dd / yyyy" required>

        <label>School</label>
        <input type="text" id="school" required>

        <label>Grade</label>
        <input type="text" id="grade" required>

        <label>Gender</label>
        <select id="gender" required>
            <option value="">Select</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <label>League</label>
        <select id="league" required>
            <option value="">Select</option>
            <option value="Flag">Flag</option>
            <option value="Jr Pro">Jr Pro</option>
            <option value="Sr Pro">Sr Pro</option>
        </select>

        <label>Shirt Size</label>
        <input type="text" id="shirtSize" required>

        <label>Doctor Name</label>
        <input type="text" id="doctorName">

        <label>Doctor Phone</label>
        <input type="text" id="doctorPhone">

        <label>Allergies / Medical Notes</label>
        <input type="text" id="medical">

        <label>Payment Type</label>
        <select id="paymentType" required>
            <option value="">Select</option>
            <option value="Cash">Cash</option>
            <option value="Card">Card</option>
            <option value="Check">Check</option>
        </select>

        <label>Amount Paid (if applicable)</label>
        <input type="number" id="amountPaid" value="0.00">

        <button type="submit" class="action-btn red">Submit Registration</button>
    </form>
</section>

<!-- ⭐ ALL REGISTRATIONS -->
<section class="main-links">
    <h2>All Registrations</h2>
    <div id="allRegistrations">Loading...</div>
</section>

<!-- ⭐ NEW: GRADE STATISTICS -->
<section class="stats-section">
    <h2>Player Grade Statistics</h2>
    <div id="gradeStats" class="stats-box">
        Loading grade statistics...
    </div>
</section>

<footer>
    <p>© 2026 Bath County Youth Football</p>
</footer>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxnIbz_eMUCwMyCa52oZbJTbC6PRb77FDKG6g6CMPTHt9sOd53SYd5lceIca0xH96wpBg/exec";

// Load admin profile
document.getElementById("adminProfile").innerText =
    localStorage.getItem("adminName") + " (" + localStorage.getItem("adminEmail") + ")";

// Logout
function logout() {
    localStorage.removeItem("adminUser");
    localStorage.removeItem("adminName");
    localStorage.removeItem("adminEmail");
    window.location.href = "admin.html";
}

// ⭐ Submit In-Person Registration
document.getElementById("inPersonForm").onsubmit = async (e) => {
    e.preventDefault();

    const payload = {
        action: "adminRegister",
        adminName: localStorage.getItem("adminName"),
        adminEmail: localStorage.getItem("adminEmail"),

        playerName: document.getElementById("playerName").value.trim(),
        birthdate: document.getElementById("birthdate").value.trim(),
        school: document.getElementById("school").value.trim(),
        grade: document.getElementById("grade").value.trim(),
        gender: document.getElementById("gender").value,
        league: document.getElementById("league").value,
        shirtSize: document.getElementById("shirtSize").value.trim(),
        doctorName: document.getElementById("doctorName").value.trim(),
        doctorPhone: document.getElementById("doctorPhone").value.trim(),
        medical: document.getElementById("medical").value.trim(),
        paymentType: document.getElementById("paymentType").value,
        amountPaid: document.getElementById("amountPaid").value
    };

    const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (data.success) {
        alert("Registration submitted!");
        document.getElementById("inPersonForm").reset();
        loadAllRegistrations();
        loadGradeStats();
    } else {
        alert("Registration failed.");
    }
};

// ⭐ Load All Registrations
async function loadAllRegistrations() {
    const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "getAllRegistrations" })
    });

    const data = await res.json();
    if (!data.success) {
        document.getElementById("allRegistrations").innerText = "Unable to load registrations.";
        return;
    }

    let html = "<ul>";
    data.rows.forEach(r => {
        html += `<li>${r.playerFirst} ${r.playerLast} – Grade ${r.grade} – ${r.team}</li>`;
    });
    html += "</ul>";

    document.getElementById("allRegistrations").innerHTML = html;
}

// ⭐ Load Grade Statistics
async function loadGradeStats() {
    const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "getAllRegistrations" })
    });

    const data = await res.json();
    if (!data.success) {
        document.getElementById("gradeStats").innerText = "Unable to load stats.";
        return;
    }

    const rows = data.rows;

    let gK = 0, g1 = 0, g2 = 0, g3 = 0, g4 = 0, g5 = 0, g6 = 0;

    rows.forEach(r => {
        const grade = String(r.grade).trim();
        if (grade === "K") gK++;
        if (grade === "1") g1++;
        if (grade === "2") g2++;
        if (grade === "3") g3++;
        if (grade === "4") g4++;
        if (grade === "5") g5++;
        if (grade === "6") g6++;
    });

    const combinedK2 = gK + g1 + g2;
    const combined34 = g3 + g4;
    const combined56 = g5 + g6;

    document.getElementById("gradeStats").innerHTML = `
        <h3>Totals by Grade</h3>
        <ul>
            <li><strong>K:</strong> ${gK}</li>
            <li><strong>1st:</strong> ${g1}</li>
            <li><strong>2nd:</strong> ${g2}</li>
            <li><strong>Combined K–2:</strong> ${combinedK2}</li>
            <br>
            <li><strong>3rd:</strong> ${g3}</li>
            <li><strong>4th:</strong> ${g4}</li>
            <li><strong>Combined 3–4:</strong> ${combined34}</li>
            <br>
            <li><strong>5th:</strong> ${g5}</li>
            <li><strong>6th:</strong> ${g6}</li>
            <li><strong>Combined 5–6:</strong> ${combined56}</li>
        </ul>
    `;
}

// Load everything on page load
loadAllRegistrations();
loadGradeStats();
</script>

</body>
</html>
