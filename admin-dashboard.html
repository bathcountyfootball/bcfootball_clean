<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <!-- GLOBAL MODERN ATHLETIC THEME -->
    <link rel="stylesheet" href="theme.css">

    <style>
        .section-container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }
    </style>
</head>

<body>

<script>
if (!localStorage.getItem("adminUser")) {
    window.location.href = "admin-login.html";
}
</script>

<!-- ⭐ CENTERED ATHLETIC HEADER -->
<header class="hero">
    <h1>BATH COUNTY YOUTH FOOTBALL</h1>
</header>

<div class="section-container">

    <!-- ⭐ ADMIN PROFILE -->
    <section class="main-links">
        <h2>Admin Tools</h2>

        <div class="link-card">
            <h3>Your Admin Profile</h3>
            <p id="adminProfile">Loading...</p>
            <button class="action-btn" onclick="logout()">Logout</button>
        </div>

        <div class="link-card">
            <h3>All Registrations</h3>
            <button class="action-btn" onclick="loadRegistrations()">Load Registrations</button>
            <div id="registrationsTable"></div>
        </div>

        <div class="link-card">
            <h3>Jr Pro Equipment & Jerseys</h3>
            <button class="action-btn" onclick="openEquipment()">Manage Jr Pro Equipment</button>
        </div>
    </section>
</div>

<!-- ⭐ EQUIPMENT MODAL -->
<div id="equipmentModal" class="modal">
  <div class="modal-content">
    <h2>Jr Pro Equipment & Jersey Manager</h2>

    <label>Search Jr Pro Player</label>
    <input type="text" id="equipSearchAdmin" placeholder="Type name">

    <button class="action-btn" onclick="loadEquipmentPlayerAdmin()">Search</button>

    <div id="equipmentFormAdmin" style="margin-top:20px;"></div>

    <button class="action-btn" onclick="closeEquipment()">Close</button>
  </div>
</div>

<footer>
    <p>© 2026 Bath County Youth Football</p>
</footer>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxnIbz_eMUCwMyCa52oZbJTbC6PRb77FDKG6g6CMPTHt9sOd53SYd5lceIca0xH96wpBg/exec";

document.getElementById("adminProfile").innerText =
    (localStorage.getItem("adminName") || "Admin") +
    " (" + (localStorage.getItem("adminEmail") || "") + ")";

function logout() {
    localStorage.removeItem("adminUser");
    localStorage.removeItem("adminName");
    localStorage.removeItem("adminEmail");
    window.location.href = "admin-login.html";
}

/* ⭐ LOAD REGISTRATIONS */
async function loadRegistrations() {
    const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "getAllRegistrations" })
    });

    const data = await res.json();

    if (!data.success || !data.rows || data.rows.length === 0) {
        registrationsTable.innerHTML = "<p>No registrations found.</p>";
        return;
    }

    let html = `
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Grade</th>
                    <th>School</th>
                    <th>League</th>
                    <th>Shirt Size</th>
                    <th>Team</th>
                </tr>
            </thead>
            <tbody>
    `;

    data.rows.forEach(r => {
        html += `
            <tr>
                <td>${r.name}</td>
                <td>${r.grade}</td>
                <td>${r.school}</td>
                <td>${r.league}</td>
                <td>${r.shirtSize}</td>
                <td>${r.team}</td>
            </tr>
        `;
    });

    html += "</tbody></table>";

    registrationsTable.innerHTML = html;
}

/* ⭐ EQUIPMENT MANAGER */
function openEquipment() { equipmentModal.style.display = "flex"; }
function closeEquipment() { equipmentModal.style.display = "none"; }

async function loadEquipmentPlayerAdmin() {
    const search = equipSearchAdmin.value.trim().toLowerCase();

    const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "getAllRegistrations" })
    });

    const data = await res.json();

    const jrProPlayers = data.rows.filter(p =>
        p.team === "Jr Pro" && p.name.toLowerCase().includes(search)
    );

    if (jrProPlayers.length === 0) {
        equipmentFormAdmin.innerHTML = "<p>No Jr Pro players found.</p>";
        return;
    }

    const player = jrProPlayers[0];

    const equipRes = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "getEquipment", name: player.name })
    });

    const equipData = await equipRes.json();

    const eq = equipData.success ? equipData.equipment : {
        helmetIssued: "",
        helmetReturn: "",
        padsIssued: "",
        padsReturn: "",
        pantsIssued: "",
        pantsReturn: "",
        jerseyNumber: "",
        jerseyReturn: ""
    };

    equipmentFormAdmin.innerHTML = `
        <h3>${player.name}</h3>
        Grade: ${player.grade}<br>
        School: ${player.school}<br>
        Team: ${player.team}<br><br>

        <label>Helmet Issued</label>
        <input type="text" id="helmetIssuedAdmin" value="${eq.helmetIssued}">

        <label>Helmet Returned</label>
        <input type="text" id="helmetReturnAdmin" value="${eq.helmetReturn}">

        <label>Pads Issued</label>
        <input type="text" id="padsIssuedAdmin" value="${eq.padsIssued}">

        <label>Pads Returned</label>
        <input type="text" id="padsReturnAdmin" value="${eq.padsReturn}">

        <label>Pants Issued</label>
        <input type="text" id="pantsIssuedAdmin" value="${eq.pantsIssued}">

        <label>Pants Returned</label>
        <input type="text" id="pantsReturnAdmin" value="${eq.pantsReturn}">

        <label>Jersey Number</label>
        <input type="text" id="jerseyNumberAdmin" value="${eq.jerseyNumber}">

        <label>Jersey Returned</label>
        <input type="text" id="jerseyReturnAdmin" value="${eq.jerseyReturn}">

        <button class="action-btn"
            onclick="saveEquipmentAdmin('${player.name}', '${player.grade}', '${player.team}')">
            Save Equipment
        </button>
    `;
}

async function saveEquipmentAdmin(name, grade, team) {
    const payload = {
        action: "saveEquipment",
        name,
        grade,
        team,

        helmetIssued: helmetIssuedAdmin.value,
        helmetReturn: helmetReturnAdmin.value,
        padsIssued: padsIssuedAdmin.value,
        padsReturn: padsReturnAdmin.value,
        pantsIssued: pantsIssuedAdmin.value,
        pantsReturn: pantsReturnAdmin.value,
        jerseyNumber: jerseyNumberAdmin.value,
        jerseyReturn: jerseyReturnAdmin.value,

        updatedBy: localStorage.getItem("adminEmail")
    };

    const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(payload)
    });

    const data = await res.json();

    alert(data.success ? "Equipment saved!" : "Failed to save.");
}
</script>

</body>
</html>
