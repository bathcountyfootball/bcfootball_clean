<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="theme.css">

  <style>
    .section-container { max-width: 1200px; margin: auto; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #b30000; color: white; }
    .paid { color: green; font-weight: bold; }
    .pending { color: #b30000; font-weight: bold; }
    select, input { padding: 7px; width: 100%; }
    .small-btn { padding: 7px 10px; cursor: pointer; margin: 2px; }
  </style>
</head>

<body>

<script>
if (!localStorage.getItem("adminUser")) {
  window.location.href = "admin-login.html";
}
</script>

<header class="hero">
  <h1>BATH COUNTY YOUTH FOOTBALL</h1>
</header>

<div class="section-container">
  <section class="main-links">

    <h2>Admin Dashboard</h2>

    <div class="link-card">
      <h3>Your Admin Profile</h3>
      <p id="adminProfile">Loading...</p>
      <button class="action-btn" onclick="logout()">Logout</button>
    </div>

    <div class="link-card">
      <h3>All Registrations</h3>
      <button class="action-btn" onclick="loadRegistrations()">Refresh Registrations</button>
      <button class="action-btn" onclick="exportCSV()">Export CSV</button>
      <div id="registrationsTable"></div>
    </div>

    <div class="link-card">
      <h3>Jr Pro Equipment & Jerseys</h3>
      <button class="action-btn" onclick="openEquipment()">Manage Jr Pro Equipment</button>
    </div>

  </section>
</div>

<div id="equipmentModal" class="modal">
  <div class="modal-content">
    <h2>Jr Pro Equipment & Jersey Manager</h2>

    <label>Search Jr Pro Player</label>
    <input type="text" id="equipSearchAdmin" placeholder="Type name">

    <button class="action-btn" onclick="loadEquipmentPlayerAdmin()">Search</button>

    <div id="equipmentFormAdmin" style="margin-top:20px;"></div>

    <button class="action-btn" onclick="closeEquipment()">Close</button>
  </div>
</div>

<footer>
  <p>© 2026 Bath County Youth Football</p>
</footer>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwJR0mM--IOixP7NLMKN4owPphBM9FOtzryRJ3KbfkH0Nci8ylR2Gcg_Kg52XrwWWJQ/exec";

let allRows = [];

document.getElementById("adminProfile").innerText =
  (localStorage.getItem("adminName") || "Admin") +
  " (" + (localStorage.getItem("adminEmail") || "") + ")";

function money(amount) {
  return Number(amount || 0).toFixed(2);
}

async function api(payload) {
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });
  return await res.json();
}

function logout() {
  localStorage.removeItem("adminUser");
  localStorage.removeItem("adminName");
  localStorage.removeItem("adminEmail");
  window.location.href = "admin-login.html";
}

async function loadRegistrations() {
  registrationsTable.innerHTML = "<p>Loading...</p>";

  const data = await api({ action: "getAllRegistrations" });

  if (!data.success || !data.rows || data.rows.length === 0) {
    registrationsTable.innerHTML = "<p>No registrations found.</p>";
    return;
  }

  allRows = data.rows;
  renderTable();
}

async function getWaiverStatus(email) {
  const data = await api({
    action: "getParentWaiver",
    parentEmail: email
  });

  return data.success && data.signed ? "Signed" : "Not Signed";
}

async function renderTable() {
  let html = `
    <table>
      <thead>
        <tr>
          <th>Player</th>
          <th>Parent</th>
          <th>League</th>
          <th>Grade</th>
          <th>Fee</th>
          <th>Payment</th>
          <th>Waiver</th>
          <th>Team</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
  `;

  for (const r of allRows) {
    const waiver = await getWaiverStatus(r.parentEmail);

    html += `
      <tr>
        <td>${r.name || ""}</td>
        <td>
          ${r.parentName || ""}<br>
          <small>${r.parentEmail || ""}</small>
        </td>
        <td>${r.league || ""}</td>
        <td>${r.grade || ""}</td>
        <td>$${money(r.finalFee)}</td>
        <td class="${String(r.paymentStatus).toLowerCase() === "paid" ? "paid" : "pending"}">
          ${r.paymentStatus || "Pending"}
        </td>
        <td>${waiver}</td>
        <td>
          <select id="team-${r.id}">
            <option value="">Unassigned</option>
            <option value="Flag" ${r.team === "Flag" ? "selected" : ""}>Flag</option>
            <option value="Jr Pro" ${r.team === "Jr Pro" ? "selected" : ""}>Jr Pro</option>
            <option value="3rd/4th Grade" ${r.team === "3rd/4th Grade" ? "selected" : ""}>3rd/4th Grade</option>
            <option value="5th/6th Grade" ${r.team === "5th/6th Grade" ? "selected" : ""}>5th/6th Grade</option>
          </select>
        </td>
        <td>
          <button class="small-btn" onclick="saveTeam('${r.id}')">Save Team</button>
          <button class="small-btn" onclick="markPaid('${r.id}')">Mark Paid</button>
          <button class="small-btn" onclick="markPending('${r.id}')">Mark Pending</button>
        </td>
      </tr>
    `;
  }

  html += "</tbody></table>";
  registrationsTable.innerHTML = html;
}

async function markPaid(id) {
  const data = await api({
    action: "markPaymentStatus",
    id,
    paymentStatus: "Paid"
  });

  alert(data.success ? "Marked paid." : "Failed to update.");
  loadRegistrations();
}

async function markPending(id) {
  const data = await api({
    action: "markPaymentStatus",
    id,
    paymentStatus: "Pending"
  });

  alert(data.success ? "Marked pending." : "Failed to update.");
  loadRegistrations();
}

async function saveTeam(id) {
  const team = document.getElementById("team-" + id).value;

  const data = await api({
    action: "adminUpdateTeam",
    id,
    team
  });

  alert(data.success ? "Team saved." : "Failed to save team.");
  loadRegistrations();
}

function exportCSV() {
  if (!allRows.length) {
    alert("Load registrations first.");
    return;
  }

  const headers = [
    "Player",
    "Parent",
    "Email",
    "Phone",
    "League",
    "Grade",
    "School",
    "Team",
    "Fee",
    "Payment Status",
    "Emergency Contact",
    "Emergency Phone",
    "Medical",
    "Allergies"
  ];

  const csvRows = [headers.join(",")];

  allRows.forEach(r => {
    const row = [
      r.name,
      r.parentName,
      r.parentEmail,
      r.parentPhone,
      r.league,
      r.grade,
      r.school,
      r.team,
      r.finalFee,
      r.paymentStatus,
      r.emergencyName,
      r.emergencyPhone,
      r.medical,
      r.allergies
    ].map(v => `"${String(v || "").replace(/"/g, '""')}"`);

    csvRows.push(row.join(","));
  });

  const blob = new Blob([csvRows.join("\n")], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "registrations.csv";
  a.click();

  URL.revokeObjectURL(url);
}

function openEquipment() {
  equipmentModal.style.display = "flex";
}

function closeEquipment() {
  equipmentModal.style.display = "none";
}

async function loadEquipmentPlayerAdmin() {
  const search = equipSearchAdmin.value.trim().toLowerCase();

  const data = await api({ action: "getAllRegistrations" });

  const jrProPlayers = data.rows.filter(p =>
    String(p.league).toLowerCase().includes("jr") &&
    String(p.name).toLowerCase().includes(search)
  );

  if (jrProPlayers.length === 0) {
    equipmentFormAdmin.innerHTML = "<p>No Jr Pro players found.</p>";
    return;
  }

  const player = jrProPlayers[0];

  const equipData = await api({
    action: "getEquipment",
    name: player.name
  });

  const eq = equipData.success ? equipData.equipment : {
    helmetIssued: "",
    helmetReturn: "",
    padsIssued: "",
    padsReturn: "",
    pantsIssued: "",
    pantsReturn: "",
    jerseyNumber: "",
    jerseyReturn: ""
  };

  equipmentFormAdmin.innerHTML = `
    <h3>${player.name}</h3>
    Grade: ${player.grade}<br>
    School: ${player.school}<br>
    Team: ${player.team || "Unassigned"}<br><br>

    <label>Helmet Issued</label>
    <input type="text" id="helmetIssuedAdmin" value="${eq.helmetIssued || ""}">

    <label>Helmet Returned</label>
    <input type="text" id="helmetReturnAdmin" value="${eq.helmetReturn || ""}">

    <label>Pads Issued</label>
    <input type="text" id="padsIssuedAdmin" value="${eq.padsIssued || ""}">

    <label>Pads Returned</label>
    <input type="text" id="padsReturnAdmin" value="${eq.padsReturn || ""}">

    <label>Pants Issued</label>
    <input type="text" id="pantsIssuedAdmin" value="${eq.pantsIssued || ""}">

    <label>Pants Returned</label>
    <input type="text" id="pantsReturnAdmin" value="${eq.pantsReturn || ""}">

    <label>Jersey Number</label>
    <input type="text" id="jerseyNumberAdmin" value="${eq.jerseyNumber || ""}">

    <label>Jersey Returned</label>
    <input type="text" id="jerseyReturnAdmin" value="${eq.jerseyReturn || ""}">

    <button class="action-btn"
      onclick="saveEquipmentAdmin('${player.name}', '${player.grade}', '${player.team || ""}')">
      Save Equipment
    </button>
  `;
}

async function saveEquipmentAdmin(name, grade, team) {
  const payload = {
    action: "saveEquipment",
    name,
    grade,
    team,
    helmetIssued: helmetIssuedAdmin.value,
    helmetReturn: helmetReturnAdmin.value,
    padsIssued: padsIssuedAdmin.value,
    padsReturn: padsReturnAdmin.value,
    pantsIssued: pantsIssuedAdmin.value,
    pantsReturn: pantsReturnAdmin.value,
    jerseyNumber: jerseyNumberAdmin.value,
    jerseyReturn: jerseyReturnAdmin.value,
    updatedBy: localStorage.getItem("adminEmail")
  };

  const data = await api(payload);

  alert(data.success ? "Equipment saved!" : "Failed to save.");
}
</script>

</body>
</html>
