<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fish Fry Preorders</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f4f4f4;color:#222;font-family:Arial,Helvetica,sans-serif}
    .hero{background:linear-gradient(135deg,#111,#b30000);color:#fff;text-align:center;padding:32px 20px}
    .page{max-width:1200px;margin:25px auto;padding:0 16px 30px}.card{background:#fff;border-radius:13px;padding:22px;margin-bottom:22px;box-shadow:0 4px 13px rgba(0,0,0,.13)}
    .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.summary-card{background:#fff;border-left:6px solid #b30000;border-radius:10px;padding:17px;box-shadow:0 3px 9px rgba(0,0,0,.1)}
    .summary-card strong{display:block;color:#b30000;margin-bottom:7px}.summary-card span{font-size:28px;font-weight:bold}
    .button{display:inline-block;border:none;border-radius:8px;background:#b30000;color:#fff;padding:11px 16px;margin:5px 5px 5px 0;font-weight:bold;cursor:pointer;text-decoration:none}
    .button:hover{background:#8e0000}.table-wrapper{overflow-x:auto}table{width:100%;border-collapse:collapse;margin-top:16px}
    th,td{border:1px solid #ccc;padding:10px;text-align:left}th{background:#b30000;color:#fff}
    @media(max-width:800px){.summary-grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:500px){.summary-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<script>
if(!localStorage.getItem("adminUser")){window.location.href="admin.html";}
</script>

<header class="hero"><h1>Fish Fry Preorders</h1><p>Friday, August 7, 2026</p></header>

<main class="page">
  <section class="card">
    <button class="button" onclick="loadOrders()">Refresh Orders</button>
    <button class="button" onclick="exportOrders()">Export CSV</button>
    <a class="button" href="admin-dashboard.html">Back to Admin Dashboard</a>
    <div id="summary" class="summary-grid" style="margin-top:18px;">Loading summary...</div>
  </section>

  <section class="card">
    <h2>Preorder List</h2>
    <div id="ordersTable">Loading preorders...</div>
  </section>
</main>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwJR0mM--IOixP7NLMKN4owPphBM9FOtzryRJ3KbfkH0Nci8ylR2Gcg_Kg52XrwWWJQ/exec";
let orders=[];

async function api(payload){
  const response=await fetch(API_URL,{method:"POST",body:JSON.stringify(payload)});
  return await response.json();
}

function money(value){return Number(value||0).toFixed(2);}

function escapeHtml(value){
  return String(value||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}

function formatDate(value){
  if(!value)return "";
  const date=new Date(value);
  if(isNaN(date.getTime()))return String(value);
  return date.toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"});
}

async function loadOrders(){
  ordersTable.innerHTML="<p>Loading preorders...</p>";

  const data=await api({action:"getFishFryOrders"});

  if(!data.success){
    summary.innerHTML="<p>Could not load summary.</p>";
    ordersTable.innerHTML="<p>Could not load preorders.</p>";
    return;
  }

  orders=data.orders||[];

  summary.innerHTML=`
    <div class="summary-card"><strong>Total Customers</strong><span>${Number(data.totalCustomers||0)}</span></div>
    <div class="summary-card"><strong>Total Dinners</strong><span>${Number(data.totalDinners||0)}</span></div>
    <div class="summary-card"><strong>Projected Sales</strong><span>$${money(data.projectedSales)}</span></div>
    <div class="summary-card"><strong>Ordering Status</strong><span style="font-size:20px;">${data.orderingOpen?"Open":"Closed"}</span></div>
  `;

  if(!orders.length){
    ordersTable.innerHTML="<p>No preorders have been submitted yet.</p>";
    return;
  }

  let html=`
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Date Submitted</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Dinners</th>
            <th>Total Due</th>
          </tr>
        </thead>
        <tbody>`;

  orders.forEach(order=>{
    html+=`
      <tr>
        <td>${escapeHtml(formatDate(order.createdAt))}</td>
        <td>${escapeHtml(order.name)}</td>
        <td>${escapeHtml(order.phone)}</td>
        <td>${Number(order.quantity||0)}</td>
        <td>$${money(order.total)}</td>
      </tr>`;
  });

  html+="</tbody></table></div>";
  ordersTable.innerHTML=html;
}

function exportOrders(){
  if(!orders.length){alert("There are no preorders to export.");return;}

  const headers=["Date Submitted","Name","Phone","Quantity","Total Due"];
  const csvRows=[headers.join(",")];

  orders.forEach(order=>{
    const row=[
      formatDate(order.createdAt),
      order.name,
      order.phone,
      order.quantity,
      order.total
    ].map(value=>`"${String(value||"").replace(/"/g,'""')}"`);

    csvRows.push(row.join(","));
  });

  const blob=new Blob([csvRows.join("\n")],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const anchor=document.createElement("a");
  anchor.href=url;
  anchor.download="fish-fry-preorders.csv";
  anchor.click();
  URL.revokeObjectURL(url);
}

document.addEventListener("DOMContentLoaded",loadOrders);
</script>
</body>
</html>
